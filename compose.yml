name: connect-utah-today

services:
    website:
        build:
            context: .
            dockerfile: apps/website/Dockerfile
        image: ${WEBSITE_IMAGE:-ghcr.io/quoththebirb/connect-utah-today/website:latest}
        restart: unless-stopped
        environment:
            - DATABASE_URL=${DATABASE_URL}
            - PAYLOAD_SECRET=${PAYLOAD_SECRET}
            - RUNPOD_ENDPOINT_ID=${RUNPOD_ENDPOINT_ID}
            - RUNPOD_API_KEY=${RUNPOD_API_KEY}
        volumes:
            - payload-data:/app/apps/website/public
        working_dir: /app
        depends_on:
            - db

    db:
        restart: always
        image: postgres:latest
        environment:
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            - POSTGRES_DB=${POSTGRES_DB}
            - POSTGRES_USER=${POSTGRES_USER}
        volumes:
            - data:/var/lib/postgresql

    caddy:
        restart: unless-stopped
        image: ${CADDY_IMAGE:-ghcr.io/quoththebirb/connect-utah-today/caddy:latest}
        ports:
            - "80:80"
            - "443:443"
            - "443:443/udp"
        volumes:
            - caddy_data:/data
            - caddy_config:/config
        depends_on:
            - website
        environment:
            - DOMAIN_PRIMARY=connectutah.today
            - DOMAIN_SECONDARY=connectutahtoday.org

volumes:
    data:
        external: true
    payload-data:
        external: true
    caddy_data:
        name: "caddy_data"
    caddy_config:
        name: "caddy_config"
