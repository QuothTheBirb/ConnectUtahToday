name: Website Deployment

on:
    push:
        branches: [ main ]
        paths:
            - turbo.json
            - apps/website/**
            - .github/workflows/deploy-website.yaml
            - compose.yml
            - package.json
            - package-lock.json
            - .dockerignore
            - tooling/caddy/**

permissions:
    contents: read
    packages: write
    actions: write
    id-token: write
    repository-projects: read

env:
    IMAGE_REGISTRY: ghcr.io
    IMAGE_TAG_SHA: ${{ github.sha }}
    PACKAGE_NAME: website

jobs:
    build-website:
        runs-on: ubuntu-latest
        environment: production
        concurrency:
            group: website-production
            cancel-in-progress: true
        outputs:
            digest: ${{ steps.push.outputs.digest }}
        steps:
            -   name: Checkout repository
                uses: actions/checkout@v4

            -   name: Log in to the Github Container registry
                uses: docker/login-action@v3
                with:
                    registry: ${{ env.IMAGE_REGISTRY }}
                    username: ${{ github.actor }}
                    password: ${{ secrets.GITHUB_TOKEN }}

            -   name: Set IMAGE_NAME with lower-cased repository
                run: |
                    echo "IMAGE_NAME=${GITHUB_REPOSITORY@L}/${{ env.PACKAGE_NAME }}" >> "${GITHUB_ENV}"

            -   name: Docker meta
                id: meta
                uses: docker/metadata-action@v5
                with:
                    images: |
                        ghcr.io/${{ env.IMAGE_NAME }}
                    tags: |
                        type=raw,value=latest,enable={{is_default_branch}}
                        type=ref,event=tag
                        type=raw,${{ env.IMAGE_TAG_SHA }}

            -   name: Build and push Docker image
                id: push
                uses: docker/build-push-action@v6.5.0
                with:
                    context: .
                    file: apps/website/Dockerfile
                    push: true
                    tags: ${{ steps.meta.outputs.tags }}
                    labels: ${{ steps.meta.outputs.labels }}
                    secrets: |
                        DOTENV_PRIVATE_KEY_PRODUCTION=${{ secrets.DOTENV_PRIVATE_KEY_WEBSITE_PRODUCTION }}

    build-caddy:
        runs-on: ubuntu-latest
        environment: production
        concurrency:
            group: caddy-production
            cancel-in-progress: true
        outputs:
            digest: ${{ steps.push.outputs.digest }}
        steps:
            -   name: Checkout repository
                uses: actions/checkout@v4

            -   name: Log in to the Github Container registry
                uses: docker/login-action@v3
                with:
                    registry: ${{ env.IMAGE_REGISTRY }}
                    username: ${{ github.actor }}
                    password: ${{ secrets.GITHUB_TOKEN }}

            -   name: Set IMAGE_NAME with lower-cased repository
                run: |
                    echo "IMAGE_NAME=${GITHUB_REPOSITORY@L}/caddy" >> "${GITHUB_ENV}"

            -   name: Docker meta
                id: meta
                uses: docker/metadata-action@v5
                with:
                    images: |
                        ghcr.io/${{ env.IMAGE_NAME }}
                    tags: |
                        type=raw,value=latest,enable={{is_default_branch}}
                        type=ref,event=tag
                        type=raw,${{ env.IMAGE_TAG_SHA }}

            -   name: Build and push Docker image
                id: push
                uses: docker/build-push-action@v6.5.0
                with:
                    context: tooling/caddy
                    push: true
                    tags: ${{ steps.meta.outputs.tags }}
                    labels: ${{ steps.meta.outputs.labels }}

    deploy-website:
        runs-on: ubuntu-latest
        needs: [ build-website, build-caddy ]
        environment: production
        steps:
            -   name: Checkout repository
                uses: actions/checkout@v4

            -   name: Set up Image Names
                run: |
                    echo "IMAGE_NAME_WEBSITE=ghcr.io/${GITHUB_REPOSITORY@L}/website" >> "${GITHUB_ENV}"
                    echo "IMAGE_NAME_CADDY=ghcr.io/${GITHUB_REPOSITORY@L}/caddy" >> "${GITHUB_ENV}"
                    echo "IMAGE_TAG=${{ github.sha }}" >> "${GITHUB_ENV}"

            -   name: Set up SSH
                uses: webfactory/ssh-agent@v0.9.1
                with:
                    ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

            -   name: Add remote server to known_hosts
                run: |
                    ssh-keyscan ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

            -   name: Deploy to server
                run: |
                    # Copy the necessary files to the server
                    scp compose.yml root@${{ secrets.SSH_HOST }}:/tmp/compose.yml
                    scp apps/website/.env.production root@${{ secrets.SSH_HOST }}:/tmp/.env.production
                    
                    # Connect to the server to create website directory, move the compose.yml file there, and start the containers
                    ssh root@${{ secrets.SSH_HOST }} << 'EOF'
                        # Exit immediately if a command exits with a non-zero status.
                        set -e
                    
                        # Ensure the website directory exists
                        mkdir -p ${{ secrets.WORK_DIR }}
                    
                        # Create external volumes if they don't exist
                        docker volume create data || true
                        docker volume create payload-data || true
                        docker volume create llm_model_storage || true
                    
                        # Create the .env.local file from the github secret
                        echo "DOTENV_PRIVATE_KEY_PRODUCTION=${{ secrets.DOTENV_PRIVATE_KEY_WEBSITE_PRODUCTION }}" > ${{ secrets.WORK_DIR }}/.env.local
                    
                        # Move the new compose file from /tmp to the website directory
                        mv /tmp/compose.yml ${{ secrets.WORK_DIR }}/compose.yml
                        mv /tmp/.env.production ${{ secrets.WORK_DIR }}/.env.production
                        cd ${{ secrets.WORK_DIR }}
                    
                        WEBSITE_IMAGE=${{ env.IMAGE_NAME_WEBSITE }}:${{ env.IMAGE_TAG }} \
                        CADDY_IMAGE=${{ env.IMAGE_NAME_CADDY }}:${{ env.IMAGE_TAG }} \
                        docker compose pull
                    
                        WEBSITE_IMAGE=${{ env.IMAGE_NAME_WEBSITE }}:${{ env.IMAGE_TAG }} \
                        CADDY_IMAGE=${{ env.IMAGE_NAME_CADDY }}:${{ env.IMAGE_TAG }} \
                        docker compose up -d
                    EOF
